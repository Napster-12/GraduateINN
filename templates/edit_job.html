{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="card shadow-lg border-0">

<div class="card-header bg-warning text-dark">
<h4 class="mb-0">Edit Opportunity</h4>
</div>

<div class="card-body">

<form method="post">

<!-- JOB INFORMATION -->
<h5 class="mb-3">Job Information</h5>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Job Title</label>
<input name="title" class="form-control"
value="{{ job.title }}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Company</label>
<input name="company" class="form-control"
value="{{ job.company }}">
</div>

</div>


<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Location</label>
<input name="location" class="form-control"
value="{{ job.location }}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Field</label>
<input name="field" class="form-control"
value="{{ job.field }}">
</div>

</div>


<div class="mb-3">
<label class="form-label">Qualification Required</label>
<input name="qualification" class="form-control"
value="{{ job.qualification }}">
</div>


<hr>


<!-- DESCRIPTION -->

<h5 class="mb-3">Job Description</h5>

<div class="mb-3">
<label class="form-label">Description</label>

<textarea name="description" rows="4" class="form-control">
{{ job.description }}
</textarea>

</div>


<hr>


<!-- REQUIREMENTS -->

<h5 class="mb-3">Requirements</h5>

<div class="mb-3">
<label class="form-label">Minimum Requirements</label>

<textarea name="requirements" rows="4" class="form-control">
{{ job.requirements }}
</textarea>

</div>


<hr>


<!-- APPLICATION -->

<h5 class="mb-3">Application Information</h5>

<div class="mb-3">
<label class="form-label">Application Link</label>

<input name="application_link" class="form-control"
value="{{ job.application_link }}">
</div>


<div class="mb-3">
<label class="form-label">Closing Date</label>

<input type="date" name="closing_date"
class="form-control"
value="{{ job.closing_date }}">
</div>


<div class="d-flex justify-content-between mt-4">

<a href="/dashboard" class="btn btn-outline-secondary">
Cancel
</a>

<button class="btn btn-warning px-4">
Update Opportunity
</button>

</div>

</form>

</div>

</div>

</div>

{% endblock %}
