{% extends "base.html" %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card shadow-lg border-0" style="max-width:420px;width:100%;border-radius:15px;">
        
        <div class="card-body p-5">

            <div class="text-center mb-4">
                <h3 class="fw-bold">Admin Login</h3>
                <p class="text-muted">Sign in to access the admin dashboard</p>
            </div>

            <form method="post">

                <!-- Username -->
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                        <input name="username" class="form-control" placeholder="Enter username" required>
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>

                        <input id="password" name="password" type="password" class="form-control" placeholder="Enter password" required>

                        <button type="button" class="input-group-text" onclick="togglePassword()" style="cursor:pointer;">
                            <i id="eyeIcon" class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Login Button -->
                <div class="d-grid">
                    <button class="btn btn-primary btn-lg">
                        Login
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>

<!-- Password Toggle Script -->
<script>
function togglePassword() {

    const password = document.getElementById("password");
    const icon = document.getElementById("eyeIcon");

    if (password.type === "password") {
        password.type = "text";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
    } else {
        password.type = "password";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
    }

}
</script>

{% endblock %}
